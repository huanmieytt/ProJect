<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>成功</title>
</head>
<body>
    <h1>成功!!</h1>
    <!--th:text 将div文本里的值设置为:-->
    <hr>
    <div th:text="${hello}"></div>
    <div th:utext="${hello}"></div>
    <hr>

    <!--th:each 每次遍历搜会生成当前这个标签-->
    <h4 th:text="${user}" th:each="user:${users}"></h4>
    <hr>
    <h4>
        <span th:each="user:${users}">[[${user}]]</span>
    </h4>
</body>
</html>
